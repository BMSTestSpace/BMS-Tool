<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMS Troubleshooter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f5f7fa;
      --border: #dde1ea;
      --border-bright: #b0bcd4;
      --text: #1a2233;
      --text-muted: #5a6a8a;
      --text-dim: #a0aabb;
      --accent: #16a34a;
      --accent-dim: #dcfce7;
      --green: #22c55e;
      --green-dim: #dcfce7;
      --amber: #d97706;
      --amber-dim: #fef3c7;
      --red: #ef4444;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    /* ── Login modal ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(200, 210, 225, 0.85);
      display: flex; align-items: center; justify-content: center;
    }
    #login-overlay.hidden { display: none; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      padding: 32px 28px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .login-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }

    .login-logo-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 2px 7px;
    }

    .login-logo-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
    }

    .login-heading {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .login-field label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .login-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 9px 12px;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .login-field input:focus { border-color: var(--accent); }
    .login-field input::placeholder { color: var(--text-dim); }

    .login-error {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      margin-bottom: 10px;
      min-height: 14px;
    }

    .login-submit {
      width: 100%;
      padding: 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 5px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .login-submit:hover { background: #26396a; }
    .login-submit:disabled { opacity: 0.5; cursor: default; }

    /* ── Save status toast ── */
    #save-toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    #save-toast.show { opacity: 1; transform: translateY(0); }
    #save-toast.ok { color: var(--green); border-color: var(--green-dim); }
    #save-toast.err { color: var(--red); }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .header-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 2px 7px;
      text-transform: uppercase;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      margin-left: auto;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 49px);
    }

    /* Flow panel */
    .flow-panel {
      border-right: 1px solid var(--border);
      overflow: auto;
      background: var(--bg);
      position: relative;
    }

    .flow-panel-label {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 10;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 8px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    #flow-container {
      padding: 16px;
    }

    #flow-svg {
      display: block;
      overflow: visible;
    }

    /* Right column panel setup */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    .q-panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      background: var(--surface);
    }

    .history-trail {
      padding: 4px 16px;
      border-bottom: 1px solid var(--border);
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      overflow: hidden;
      background: var(--surface);
    }

    .crumb {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .crumb-sep {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .crumb.active { color: var(--accent); }

    /* Top interactive question half */
    .q-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .step-counter {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .q-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .ans-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }

    .ans-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .ans-btn::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .ans-btn:hover::before { background: var(--accent); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    .nav-row {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover { border-color: var(--border-bright); color: var(--text); }

    /* Result */
    .result-box {
      border: 1px solid #f97316;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
      background: #fff7ed;
    }

    .result-section {
      padding: 10px 12px;
    }

    .result-section + .result-section {
      border-top: 1px solid #fed7aa;
    }

    .result-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-diag {
      font-size: 13px;
      font-weight: 500;
      color: #c2410c;
    }

    .result-action {
      font-size: 13px;
      color: #7c3510;
      line-height: 1.4;
    }

    .restart-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .restart-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    /* SVG node styles */
    .flow-node { cursor: pointer; }
    .flow-node rect { transition: filter 0.15s; }
    .flow-node:hover rect { filter: brightness(1.15); }

    /* ── Integrated Gemini Box (Bottom-Right Panel) ── */
    .gem-panel-divider {
      height: 1px;
      background: var(--border-bright);
    }

    .gemini-integrated-box {
      height: 380px;
      display: flex;
      flex-direction: column;
      background: var(--surface2);
    }

    .gem-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .gem-dot { width: 14px; height: 14px; border-radius: 50%; background: linear-gradient(135deg,#4285f4,#34a853); flex-shrink:0; }
    .gem-title { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text); flex: 1; }
    .gem-sub { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }

    .gem-messages {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .gem-msg {
      max-width: 90%; font-size: 12px; line-height: 1.5;
      padding: 8px 11px; border-radius: 8px; font-family: var(--sans);
    }
    .gem-msg.user {
      align-self: flex-end;
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid var(--accent); border-bottom-right-radius: 2px;
    }
    .gem-msg.ai {
      align-self: flex-start;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 2px;
    }

    .gem-quick-btns { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px 6px; overflow-x: auto; }
    .gem-quick-btn {
      font-family: var(--mono); font-size: 9px;
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); color: var(--text-muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .gem-quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    .gem-input-row {
      display: flex; gap: 6px; padding: 8px 12px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .gem-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
      font-family: var(--sans); font-size: 12px; color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .gem-input:focus { border-color: var(--accent); }
    .gem-input::placeholder { color: var(--text-dim); }
    .gem-send {
      background: var(--accent); border: none; border-radius: 6px;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
    }
    .gem-send:hover { opacity: 0.85; }
    .gem-send:disabled { opacity: 0.4; cursor: default; }

  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-badge">BMS</span>
      <span class="login-logo-title">Troubleshooter</span>
    </div>
    <div class="login-heading">identify yourself to continue</div>
    <div class="login-field">
      <label>Name</label>
      <input type="text" id="login-name" placeholder="Jane Smith" autocomplete="name" />
    </div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="jane@company.com" autocomplete="email" />
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-submit" id="login-btn" onclick="submitLogin()">start session →</button>
  </div>
</div>

<div id="save-toast"></div>

<header>
  <span class="header-badge">BMS</span>
  <h1>Troubleshooter</h1>
  <div id="user-chip" style="margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-muted);"></div>
  <div class="status-dot" style="margin-left:0"></div>
</header>

<div class="main">
  <div class="flow-panel">
    <div class="flow-panel-label">diagnostic tree</div>
    <div id="flow-container">
      <svg id="flow-svg"></svg>
    </div>
  </div>

  <div class="right-panel">
    <div class="q-panel-label">current step</div>
    <div class="history-trail" id="history-trail"></div>
    
    <div class="q-content" id="q-content"></div>

    <div class="gem-panel-divider"></div>

    <div class="gemini-integrated-box">
      <div class="gem-header">
        <div class="gem-dot"></div>
        <div class="gem-title">BMS Copilot <span class="gem-sub">Gemini 2.5</span></div>
      </div>
      <div class="gem-messages" id="gem-messages"></div>
      <div class="gem-quick-btns" id="gem-quick-btns"></div>
      <div class="gem-input-row">
        <input type="text" id="gem-input" class="gem-input" placeholder="Ask about this step..." />
        <button id="gem-send" class="gem-send" onclick="geminiSend()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Supabase config ──────────────────────────────────────────────────────────
const SB_URL = "https://emkehdoofgaztuqmuyxw.supabase.co";
const SB_KEY = "sb_publishable_I1VLxzwJrumRfOoAbdIyCw_ZEG4u2hl";

async function sbInsert(row) {
  const res = await fetch(`${SB_URL}/rest/v1/bms_sessions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(row)
  });
  if (!res.ok) {
    const err = await res.text();
    console.error("Supabase error:", err);
    throw new Error(err);
  }
  return res.json();
}
