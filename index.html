<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HVAC Troubleshooter</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1f2933, #111827);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f9fafb;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      color: #111827;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-restart {
      background-color: #3b82f6;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>BMS Troubleshooter</h1>
    <div id="app"></div>
  </div>

  <script>
    let tree;
    let currentStep;

    fetch("https://raw.githubusercontent.com/2abdshjb2u3obe/BMS-Tool/main/output.json")
      .then(response => response.json())
      .then(data => {
        tree = data;
        currentStep = tree.start;
        showStep();
      })
      .catch(err => {
        document.getElementById("app").innerText = "Failed to load data.";
        console.error(err);
      });

    function showStep() {
      const step = tree.steps[currentStep];
      const app = document.getElementById("app");
      app.innerHTML = "";

      if (step.question) {
        const question = document.createElement("h2");
        question.innerText = step.question;
        app.appendChild(question);

        for (let answer in step.answers) {
          const btn = document.createElement("button");
          btn.innerText = answer;
          btn.onclick = () => {
            currentStep = step.answers[answer];
            showStep();
          };
          app.appendChild(btn);
        }
      } else {
        const result = document.createElement("h2");
        result.innerText = "Diagnosis: " + step.diagnosis;

        const action = document.createElement("p");
        action.innerText = "Action: " + step.action;

        const restartBtn = document.createElement("button");
        restartBtn.className = "btn-restart";
        restartBtn.innerText = "Restart";
        restartBtn.onclick = () => {
          currentStep = tree.start;
          showStep();
        };

        app.appendChild(result);
        app.appendChild(action);
        app.appendChild(restartBtn);
      }
    }
  </script>
</body>
</html>
