<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMS Troubleshooter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f5f7fa;
      --border: #dde1ea;
      --border-bright: #b0bcd4;
      --text: #1a2233;
      --text-muted: #5a6a8a;
      --text-dim: #a0aabb;
      --accent: #16a34a;
      --accent-dim: #dcfce7;
      --green: #22c55e;
      --green-dim: #dcfce7;
      --amber: #d97706;
      --amber-dim: #fef3c7;
      --red: #ef4444;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    /* ── Login modal ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(200, 210, 225, 0.85);
      display: flex; align-items: center; justify-content: center;
    }
    #login-overlay.hidden { display: none; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      padding: 32px 28px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .login-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }

    .login-logo-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 2px 7px;
    }

    .login-logo-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
    }

    .login-heading {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .login-field label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .login-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 9px 12px;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .login-field input:focus { border-color: var(--accent); }
    .login-field input::placeholder { color: var(--text-dim); }

    .login-error {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      margin-bottom: 10px;
      min-height: 14px;
    }

    .login-submit {
      width: 100%;
      padding: 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 5px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .login-submit:hover { background: #26396a; }
    .login-submit:disabled { opacity: 0.5; cursor: default; }

    /* ── Save status toast ── */
    #save-toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    #save-toast.show { opacity: 1; transform: translateY(0); }
    #save-toast.ok { color: var(--green); border-color: var(--green-dim); }
    #save-toast.err { color: var(--red); }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .header-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 2px 7px;
      text-transform: uppercase;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      margin-left: auto;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 49px);
    }

    /* Flow panel */
    .flow-panel {
      border-right: 1px solid var(--border);
      overflow: auto;
      background: var(--bg);
      position: relative;
    }

    .flow-panel-label {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 10;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 8px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    #flow-container {
      padding: 16px;
    }

    #flow-svg {
      display: block;
      overflow: visible;
    }

    /* Question panel */
    .q-panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    .q-panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    .q-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .step-counter {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .q-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .ans-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }

    .ans-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .ans-btn::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .ans-btn:hover::before { background: var(--accent); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    .nav-row {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover { border-color: var(--border-bright); color: var(--text); }

    /* Result */
    .result-box {
      border: 1px solid #f97316;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
      background: #fff7ed;
    }

    .result-section {
      padding: 12px 14px;
    }

    .result-section + .result-section {
      border-top: 1px solid #fed7aa;
    }

    .result-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .result-diag {
      font-size: 13px;
      font-weight: 500;
      color: #c2410c;
    }

    .result-action {
      font-size: 13px;
      color: #7c3510;
      line-height: 1.5;
    }

    .restart-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .restart-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    /* History breadcrumb */
    .history-trail {
      padding: 0 16px 0;
      border-bottom: 1px solid var(--border);
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .crumb {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .crumb-sep {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .crumb.active { color: var(--accent); }

    /* SVG node styles */
    .flow-node { cursor: pointer; }
    .flow-node rect { transition: filter 0.15s; }
    .flow-node:hover rect { filter: brightness(1.15); }

    /* ── Gemini chat bubble ── */
    #gemini-fab {
      position: fixed;
      bottom: 24px; left: 24px;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4285f4, #34a853);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(66,133,244,0.35);
      z-index: 200;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #gemini-fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(66,133,244,0.45); }

    #gemini-drawer {
      position: fixed;
      bottom: 86px; left: 24px;
      width: 340px; max-height: 520px;
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      z-index: 199; overflow: hidden;
      transform: scale(0.92) translateY(12px);
      transform-origin: bottom left;
      opacity: 0; pointer-events: none;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), opacity 0.18s;
    }
    #gemini-drawer.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

    .gem-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2); flex-shrink: 0;
    }
    .gem-dot { width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg,#4285f4,#34a853); flex-shrink:0; }
    .gem-title { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text); flex: 1; }
    .gem-sub { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
    .gem-close { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 18px; line-height:1; padding: 0 2px; }
    .gem-close:hover { color: var(--text); }

    .gem-messages {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    .gem-msg {
      max-width: 90%; font-size: 12.5px; line-height: 1.55;
      padding: 8px 11px; border-radius: 10px; font-family: var(--sans);
    }
    .gem-msg.user {
      align-self: flex-end;
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid var(--accent); border-bottom-right-radius: 3px;
    }
    .gem-msg.ai {
      align-self: flex-start;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 3px;
    }
    .gem-msg.typing { color: var(--text-dim); font-style: italic; }

    .gem-quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 8px; }
    .gem-quick-btn {
      font-family: var(--mono); font-size: 10px;
      padding: 4px 9px; border: 1px solid var(--border); border-radius: 20px;
      background: var(--surface2); color: var(--text-muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .gem-quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    .gem-input-row {
      display: flex; gap: 6px; padding: 10px 12px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .gem-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px;
      font-family: var(--sans); font-size: 12px; color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .gem-input:focus { border-color: var(--accent); }
    .gem-input::placeholder { color: var(--text-dim); }
    .gem-send {
      background: var(--accent); border: none; border-radius: 6px;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
    }
    .gem-send:hover { opacity: 0.85; }
    .gem-send:disabled { opacity: 0.4; cursor: default; }

  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-badge">BMS</span>
      <span class="login-logo-title">Troubleshooter</span>
    </div>
    <div class="login-heading">identify yourself to continue</div>
    <div class="login-field">
      <label>Name</label>
      <input type="text" id="login-name" placeholder="Jane Smith" autocomplete="name" />
    </div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="jane@company.com" autocomplete="email" />
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-submit" id="login-btn" onclick="submitLogin()">start session →</button>
  </div>
</div>

<div id="save-toast"></div>

<header>
  <span class="header-badge">BMS</span>
  <h1>Troubleshooter</h1>
  <div id="user-chip" style="margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-muted);"></div>
  <div class="status-dot" style="margin-left:0"></div>
</header>

<div class="main">
  <div class="flow-panel">
    <div class="flow-panel-label">diagnostic tree</div>
    <div id="flow-container">
      <svg id="flow-svg"></svg>
    </div>
  </div>

  <div class="q-panel">
    <div class="q-panel-label">current step</div>
    <div class="history-trail" id="history-trail"></div>
    <div class="q-content" id="q-content"></div>
  </div>
</div>

<button id="gemini-fab" onclick="toggleGemini()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
  </svg>
</button>

<div id="gemini-drawer">
  <div class="gem-header">
    <div class="gem-dot"></div>
    <div class="gem-title">BMS Copilot <span class="gem-sub">Gemini 2.5</span></div>
    <button class="gem-close" onclick="toggleGemini()">×</button>
  </div>
  <div class="gem-messages" id="gem-messages"></div>
  <div class="gem-quick-btns" id="gem-quick-btns"></div>
  <div class="gem-input-row">
    <input type="text" id="gem-input" class="gem-input" placeholder="Ask about this step..." />
    <button id="gem-send" class="gem-send" onclick="geminiSend()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
// ─── Supabase config ──────────────────────────────────────────────────────────
const SB_URL = "https://emkehdoofgaztuqmuyxw.supabase.co";
const SB_KEY = "sb_publishable_I1VLxzwJrumRfOoAbdIyCw_ZEG4u2hl";

async function sbInsert(row) {
  const res = await fetch(`${SB_URL}/rest/v1/bms_sessions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(row)
  });
  if (!res.ok) {
    const err = await res.text();
    console.error("Supabase error:", err);
    throw new Error(err);
  }
  return res.json();
}

// ─── User identity ────────────────────────────────────────────────────────────
let currentUser = null;   // { name, email }
let sessionStart = null;

function submitLogin() {
  const name  = document.getElementById('login-name').value.trim();
  const email = document.getElementById('login-email').value.trim();
  const err   = document.getElementById('login-error');

  if (!name) { err.textContent = 'name is required'; return; }
  if (!email || !email.includes('@')) { err.textContent = 'valid email is required'; return; }

  currentUser  = { name, email };
  sessionStart = new Date().toISOString();
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('user-chip').textContent = name;

  sessionStorage.setItem('bms_user', JSON.stringify(currentUser));
}

(function restoreUser() {
  const saved = sessionStorage.getItem('bms_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      sessionStart = new Date().toISOString();
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('user-chip').textContent = currentUser.name;
    } catch(_) {}
  }
})();

// ─── Toast helper ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3200);
}

// ─── Save session to Supabase ─────────────────────────────────────────────────
async function saveSession(resultStep) {
  if (!currentUser) return;
  const deviceAnswer = history[0]?.answer || null;
  try {
    await sbInsert({
      user_name:    currentUser.name,
      user_email:   currentUser.email,
      device_type:  deviceAnswer,
      diagnosis:    resultStep.diagnosis || null,
      action:       resultStep.action    || null,
      result_id:    current,
      path:         history,
      step_count:   history.length,
      completed_at: new Date().toISOString()
    });
    showToast('✓ session saved', 'ok');
  } catch (e) {
    console.error('Supabase save failed:', e);
    showToast('⚠ save failed — check console', 'err');
  }
}

// ─── Load data ────────────────────────────────────────────────────────────────
const DATA_URL = "https://raw.githubusercontent.com/2abdshjb2u3obe/BMS-Tool/main/output.json";

let tree = null;
let current = null;
let history = [];
const NAV_KEYS = ['back', 'Restart'];

fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    tree = data;
    current = tree.start;
    render();
  })
  .catch(() => {

// ─── Layout engine ────────────────────────────────────────────────────────────
const NODE_W = 124, NODE_H = 36, GAP_X = 44, GAP_Y = 24;

function buildLayout() {
  const cols = {}, rows = {}, visited = new Set();
  const edges = [];

  function bfs() {
    const queue = [{ id: tree.start, col: 0, row: 0 }];
    const placed = {};
    const colCounters = {};

    while (queue.length) {
      const { id, col, row } = queue.shift();
      if (visited.has(id)) continue;
      visited.add(id);

      if (!(col in colCounters)) colCounters[col] = row;
      const r = Math.max(colCounters[col], row);
      colCounters[col] = r + 1;

      cols[id] = col;
      rows[id] = r;
      placed[id] = true;

      const s = tree.steps[id];
      if (!s) continue;
      const nexts = Object.entries(s.answers || {}).filter(([k]) => !NAV_KEYS.includes(k));
      const offset = -(nexts.length - 1) / 2;
      nexts.forEach(([label, nid], i) => {
        if (nid && tree.steps[nid]) {
          edges.push({ from: id, to: nid, label: nexts.length > 1 ? label : '' });
          if (!visited.has(nid)) {
            queue.push({ id: nid, col: col + Math.round(offset + i), row: r + 1 });
          }
        }
      });
    }
  }

  bfs();

  const allCols = Object.values(cols);
  const allRows = Object.values(rows);
  const minCol = Math.min(...allCols);
  const maxCol = Math.max(...allCols);
  const maxRow = Math.max(...allRows);

  const layout = {};
  Object.keys(cols).forEach(id => {
    const c = cols[id] - minCol;
    const r = rows[id];
    layout[id] = {
      x: c * (NODE_W + GAP_X) + 16,
      y: r * (NODE_H + GAP_Y) + 16,
      w: NODE_W,
      h: NODE_H
    };
  });

  const totalW = (maxCol - minCol + 1) * (NODE_W + GAP_X) + 32;
  const totalH = (maxRow + 1) * (NODE_H + GAP_Y) + 32;
  return { layout, edges, totalW, totalH };
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len - 2) + '..' : str;
}

function jumpTo(id) {
  if (!tree || !tree.steps[id]) return;
  const index = history.findIndex(h => h.stepId === id);
  if (index !== -1) {
    history = history.slice(0, index);
  } else {
    history = [];
  }
  current = id;
  render();
}

function render() {
  if (!tree) return;
  renderFlow();
  renderQuestion();
}

// ─── SVG renderer ─────────────────────────────────────────────────────────────
function renderFlow() {
  const { layout, edges, totalW, totalH } = buildLayout();
  const svg = document.getElementById('flow-svg');
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);
  svg.style.minWidth = totalW + 'px';

  const visitedSet = new Set(history.map(h => h.stepId));
  const activeEdges = new Set(history.map(h => h.stepId + '→' + h.nextId));

  let html = `<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a4a66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-active" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-current" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  edges.forEach(({ from, to, label }) => {
    const fp = layout[from], tp = layout[to];
    if (!fp || !tp) return;
    const x1 = fp.x + fp.w / 2, y1 = fp.y + fp.h;
    const x2 = tp.x + tp.w / 2, y2 = tp.y;
    const my = (y1 + y2) / 2;
    const key = from + '→' + to;
    const isActive = activeEdges.has(key);
    const isCurrent = from === current || to === current;
    const stroke = isActive ? '#16a34a' : isCurrent ? '#16a34a' : '#dde1ea';
    const marker = isActive ? 'arr-active' : isCurrent ? 'arr-current' : 'arr';
    const sw = isActive ? 1.5 : 0.8;
    const opacity = isActive ? 1 : (visitedSet.has(from) || to === current ? 0.6 : 0.3);
    html += `<path d="M${x1} ${y1} C${x1} ${my+8},${x2} ${my-8},${x2} ${y2}" fill="none" stroke="${stroke}" stroke-width="${sw}" marker-end="url(#${marker})" opacity="${opacity}"/>`;
    if (label) {
      const lx = (x1 + x2) / 2 + 3, ly = my;
      html += `<text x="${lx}" y="${ly}" font-family="IBM Plex Mono,monospace" font-size="9" fill="${isActive ? '#16a34a' : '#b0bcd4'}">${truncate(label, 7)}</text>`;
    }
  });

  Object.entries(layout).forEach(([id, pos]) => {
    const s = tree.steps[id];
    if (!s) return;
    const isCurrent = id === current;
    const isVisited = visitedSet.has(id);
    const isResult = s.diagnosis !== undefined;

    let fill, stroke, textColor, sw;
    if (isCurrent) {
      fill = '#dcfce7'; stroke = '#16a34a'; textColor = '#16a34a'; sw = 1.5;
    } else if (isVisited) {
      fill = '#dcfce7'; stroke = '#16a34a'; textColor = '#16a34a'; sw = 1;
    } else if (isResult) {
      fill = '#fff7ed'; stroke = '#fdba74'; textColor = '#9a3412'; sw = 0.8;
    } else {
      fill = '#ffffff'; stroke = '#dde1ea'; textColor = '#a0aabb'; sw = 0.5;
    }

    const label = s.question ? truncate(s.question, 18) : (s.diagnosis ? truncate(s.diagnosis, 18) : id);
    html += `<g class="flow-node" onclick="jumpTo('${id}')">
      <rect x="${pos.x}" y="${pos.y}" width="${pos.w}" height="${pos.h}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${pos.x + pos.w / 2}" y="${pos.y + pos.h / 2}" text-anchor="middle" dominant-baseline="central" font-family="IBM Plex Sans,sans-serif" font-size="11" font-weight="${isCurrent ? 500 : 400}" fill="${textColor}">${label}</text>
    </g>`;
  });

  svg.innerHTML = html;
}

// ─── Question panel ───────────────────────────────────────────────────────────
function renderQuestion() {
  const panel = document.getElementById('q-content');
  const trail = document.getElementById('history-trail');
  const step = tree.steps[current];
  panel.innerHTML = '';

  trail.innerHTML = '';
  history.forEach((h, i) => {
    const c = document.createElement('span');
    c.className = 'crumb';
    c.textContent = h.answer;
    trail.appendChild(c);
    const sep = document.createElement('span');
    sep.className = 'crumb-sep';
    sep.textContent = ' › ';
    trail.appendChild(sep);
  });
  if (history.length) {
    const cur = document.createElement('span');
    cur.className = 'crumb active';
    cur.textContent = current;
    trail.appendChild(cur);
  }

  const sc = document.createElement('div');
  sc.className = 'step-counter';
  sc.textContent = `step_${String(history.length + 1).padStart(2, '0')}`;
  panel.appendChild(sc);

  if (step.question !== undefined) {
    const q = document.createElement('div');
    q.className = 'q-text';
    q.textContent = step.question;
    panel.appendChild(q);

    const mainA = Object.entries(step.answers || {}).filter(([k]) => !NAV_KEYS.includes(k));
    const navA  = Object.entries(step.answers || {}).filter(([k]) => NAV_KEYS.includes(k));

    mainA.forEach(([ans, nid]) => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = ans;
      btn.onclick = () => {
        history.push({ stepId: current, answer: ans, nextId: nid });
        current = nid;
        render();
      };
      panel.appendChild(btn);
    });

    if (navA.length) {
      const div = document.createElement('div');
      div.className = 'divider';
      panel.appendChild(div);
      const row = document.createElement('div');
      row.className = 'nav-row';
      navA.forEach(([ans, nid]) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.textContent = ans === 'back' ? '← back' : '↺ restart';
        btn.onclick = () => {
          if (ans === 'back') history.pop(); else history = [];
          current = nid;
          render();
        };
        row.appendChild(btn);
      });
      panel.appendChild(row);
    }
  } else {
    saveSession(step);

    const box = document.createElement('div');
    box.className = 'result-box';

    const ds = document.createElement('div');
    ds.className = 'result-section';
    ds.innerHTML = `<div class="result-label">diagnosis</div><div class="result-diag">${step.diagnosis || '—'}</div>`;
    box.appendChild(ds);

    if (step.action) {
      const as = document.createElement('div');
      as.className = 'result-section';
      as.innerHTML = `<div class="result-label">recommended action</div><div class="result-action">${step.action}</div>`;
      box.appendChild(as);
    }
    panel.appendChild(box);

    const rst = document.createElement('button');
    rst.className = 'restart-btn';
    rst.textContent = '↺ restart troubleshooter';
    rst.onclick = () => {
      history = [];
      current = tree.start;
      render();
    };
    panel.appendChild(rst);
  }
}

// ─── Gemini Core Engine with 503 Jitter Backoff & Fallback ─────────────────────
let geminiOpen = false;
let geminiMessages = [];
let geminiReady = false;

function toggleGemini() {
  geminiOpen = !geminiOpen;
  document.getElementById('gemini-drawer').classList.toggle('open', geminiOpen);
  if (geminiOpen && !geminiReady) {
    geminiReady = true;
    geminiWelcome();
  }
  if (geminiOpen) setTimeout(() => document.getElementById('gem-input').focus(), 200);
}

function geminiWelcome() {
  const step = tree ? tree.steps[current] : null;
  const ctx = step?.question || step?.diagnosis || 'starting troubleshoot';
  geminiAddMsg('ai', `Hi${currentUser ? ' ' + currentUser.name.split(' ')[0] : ''}! I'm your BMS AI assistant. You're currently at: "${ctx}". Ask me anything or use the quick buttons below.`);
  renderQuickBtns();
}

function renderQuickBtns() {
  const el = document.getElementById('gem-quick-btns');
  if (!el) return;
  el.innerHTML = '';
  const btns = [
    { label: '💡 Suggest next step', prompt: 'Based on my troubleshooting path so far, what should I check next and why?' },
    { label: '📋 Summarize session', prompt: 'Summarize my troubleshooting session so far and what the findings indicate.' },
    { label: '❓ Explain this step', prompt: 'Explain why the current step matters in BMS troubleshooting and what I should look for.' },
    { label: '⚡ Common mistakes', prompt: 'What are the most common mistakes technicians make at this stage of BMS troubleshooting?' },
  ];
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'gem-quick-btn';
    btn.textContent = b.label;
    btn.onclick = () => geminiAsk(b.prompt);
    el.appendChild(btn);
  });
}

function geminiContext() {
  const step = tree ? tree.steps[current] : null;
  const pathStr = history.map(h => `Q: "${tree.steps[h.stepId]?.question || h.stepId}" → A: "${h.answer}"`).join('\n');
  const resultInfo = step?.diagnosis ? `\nDiagnosis reached: "${step.diagnosis}"\nRecommended action: "${step.action || 'N/A'}"` : '';
  return `You are an expert BMS (Building Management System) field technician assistant helping a technician diagnose an issue.

Technician: ${currentUser?.name || 'Unknown'} (${currentUser?.email || 'N/A'})
Current step question: "${step?.question || step?.diagnosis || current}"

Troubleshooting path taken so far:
${pathStr || '(just started — no steps taken yet)'}${resultInfo}

Be concise and practical. Plain language. If listing steps, number them. Keep responses under 150 words unless detail is truly needed.`;
}

function calculateJitterDelay(retryCount) {
  const initialDelayMs = 2000;
  const exponentialDelay = initialDelayMs * Math.pow(2, retryCount);
  return Math.random() * exponentialDelay;
}

async function geminiAsk(userText, retryCount = 0, useBackupModel = false) {
  if (!userText.trim() && retryCount === 0) return;

  let typingEl;
  
  if (retryCount === 0 && !useBackupModel) {
    geminiAddMsg('user', userText);
    document.getElementById('gem-input').value = '';
    typingEl = geminiAddMsg('ai', '…thinking…');
    typingEl.style.color = 'var(--text-dim)';
    typingEl.style.fontStyle = 'italic';
    geminiMessages[geminiMessages.length - 1].elReference = typingEl;
  } else {
    typingEl = geminiMessages[geminiMessages.length - 1].elReference;
  }

  const sendBtn = document.getElementById('gem-send');
  if (sendBtn) sendBtn.disabled = true;

  const contents = [];
  contents.push({ role: 'user', parts: [{ text: geminiContext() }] });
  contents.push({ role: 'model', parts: [{ text: 'Understood. Ready to assist with BMS troubleshooting.' }] });
  
  geminiMessages.slice(0, -1).forEach(m => {
    contents.push({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] });
  });
  contents.push({ role: 'user', parts: [{ text: userText }] });

  try {
    const res = await fetch("https://emkehdoofgaztuqmuyxw.supabase.co/functions/v1/ai-chat", {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_KEY}`
      },
      body: JSON.stringify({
        contents,
        generationConfig: { temperature: 0.7, maxOutputTokens: 400 },
        modelFallback: useBackupModel 
      })
    });

    const data = await res.json();

    // Catch Server 503 (High Demand)
    if (res.status === 503) {
      const maxRetries = 3;
      if (retryCount < maxRetries) {
        const delay = calculateJitterDelay(retryCount);
        typingEl.textContent = `…high demand, retrying in ${Math.round(delay/1000)}s…`;
        await new Promise(resolve => setTimeout(resolve, delay));
        return await geminiAsk(userText, retryCount + 1, useBackupModel);
      } 
      
      if (!useBackupModel) {
        typingEl.textContent = `…switching to flash server…`;
        return await geminiAsk(userText, 0, true);
      }
    }

    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';
    typingEl.textContent = reply;
    typingEl.style.color = '';
    typingEl.style.fontStyle = '';
    geminiMessages[geminiMessages.length - 1].text = reply;

  } catch (e) {
    console.error('[Gemini] Error:', e);
    typingEl.textContent = '⚠ Error: ' + e.message;
    typingEl.style.color = 'var(--red)';
    typingEl.style.fontStyle = '';
  }

  if (sendBtn) sendBtn.disabled = false;
}

function geminiSend() {
  const val = document.getElementById('gem-input').value.trim();
  if (val) geminiAsk(val);
}

function geminiAddMsg(role, text) {
  const el = document.createElement('div');
  el.className = `gem-msg ${role}`;
  el.textContent = text;
  const container = document.getElementById('gem-messages');
  if (container) {
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }
  geminiMessages.push({ role, text });
  return el;
}

// Global window layout listeners
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('login-overlay').classList.contains('hidden')) {
      submitLogin();
    } else if (document.activeElement === document.getElementById('gem-input')) {
      e.preventDefault();
      geminiSend();
    }
  }
});
