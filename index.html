<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HVAC Troubleshooter</title>

  <style>
    /* Base Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1f2933, #111827);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f9fafb;
    }

    /* App Container */
    .container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      color: #111827;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      animation: fadeIn 0.4s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.8rem;
      color: #1f2937;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.2rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.35);
    }

    .btn:hover {
      background-color: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.45);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3);
    }

    /* Diagnosis Result */
    .result {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 20px;
      margin-top: 16px;
    }

    .result h2 {
      color: #047857;
      margin-bottom: 12px;
    }

    /* Subtle animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>HVAC Troubleshooter</h1>
    <div id="app"></div>
  </div>

  <script>
    let tree;
    let currentStep;

    // Load JSON
    fetch("output.json")
      .then(response => response.json())
      .then(data => {
        tree = data;
        currentStep = tree.start;
        showStep();
      });

    function showStep() {
      const step = tree.steps[currentStep];
      const app = document.getElementById("app");
      app.innerHTML = "";

      // If it's a question
      if (step.question) {
        const question = document.createElement("h2");
        question.innerText = step.question;
        app.appendChild(question);

        for (let answer in step.answers) {
          const btn = document.createElement("button");
          btn.innerText = answer;
          btn.className = "btn";

          btn.onclick = () => {
            currentStep = step.answers[answer];
            showStep();
          };

          app.appendChild(btn);
        }
      }

      // If it's a result
      else {
        const resultBox = document.createElement("div");
        resultBox.className = "result";

        const result = document.createElement("h2");
        result.innerText = "Diagnosis";
        
        const diagnosisText = document.createElement("p");
        diagnosisText.innerText = step.diagnosis;

        const actionText = document.createElement("p");
        actionText.innerHTML = `<strong>Recommended Action:</strong> ${step.action}`;

        resultBox.appendChild(result);
        resultBox.appendChild(diagnosisText);
        resultBox.appendChild(actionText);

        app.appendChild(resultBox);
      }
    }
  </script>
</body>
</html>
